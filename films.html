<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils de Frank — Films & Séries</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
</head>
<body class="films-page">

  <!-- Barre de navigation supérieure -->
  <nav class="films-topbar">
    <div class="films-topbar-left">
      <a href="dashboard.html" class="films-back-btn">&#8592; Accueil</a>
      <span class="films-topbar-title">Films & Séries</span>
    </div>
    <div class="films-topbar-filters">
      <nav id="type-nav" class="films-filter-nav"></nav>
      <div class="films-filter-sep"></div>
      <nav id="statut-nav" class="films-filter-nav"></nav>
    </div>
    <button class="films-add-btn" onclick="ouvrirModal()">+ Ajouter</button>
  </nav>

  <!-- Contenu principal -->
  <main class="films-main">
    <div class="films-main-header">
      <h1 class="films-section-titre" id="titre-section">Tous</h1>
      <div id="films-stats" class="films-stats"></div>
    </div>
    <div class="films-grid" id="films-container"></div>
  </main>

  <!-- Modal Ajout / Modification -->
  <div class="modal-overlay hidden" id="modal-film">
    <div class="modal-box films-modal-box">
      <h3 id="modal-titre-label">Nouveau titre</h3>

      <label>Titre</label>
      <input type="text" id="modal-titre" placeholder="Ex: Inception" />

      <label>Type</label>
      <select id="modal-type">
        <option value="film">🎬 Film</option>
        <option value="serie">📺 Série</option>
      </select>

      <label>Genre</label>
      <input type="text" id="modal-genre" placeholder="Ex: Science-Fiction, Thriller…" />

      <label>Année</label>
      <input type="number" id="modal-annee" placeholder="Ex: 2010" min="1900" max="2099" />

      <label>Statut</label>
      <select id="modal-statut">
        <option value="a_voir">⏳ À voir</option>
        <option value="en_cours">▶️ En cours</option>
        <option value="vu">✅ Vu</option>
      </select>

      <label>Note (sur 5)</label>
      <div class="etoiles-input" id="etoiles-input">
        <span class="etoile" data-val="1">★</span>
        <span class="etoile" data-val="2">★</span>
        <span class="etoile" data-val="3">★</span>
        <span class="etoile" data-val="4">★</span>
        <span class="etoile" data-val="5">★</span>
      </div>
      <input type="hidden" id="modal-note" value="0" />

      <label>Commentaire (optionnel)</label>
      <textarea id="modal-commentaire" placeholder="Tes impressions…" rows="3"></textarea>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="fermerModal()">Annuler</button>
        <button class="btn-save" id="modal-save-btn">Enregistrer</button>
      </div>
    </div>
  </div>

  <script type="module" src="films.js"></script>
</body>
</html>
