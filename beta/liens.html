<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="../">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils de Frank — Liens utiles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="beta-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#f39c12;color:#000;text-align:center;padding:0.4rem 1rem;font-size:0.82rem;font-weight:bold;letter-spacing:0.05em;box-shadow:0 2px 6px rgba(0,0,0,0.3);">🚧 MODE EN CONSTRUCTION — les modifications ici n'affectent pas le site principal <body>nbsp;·<body>nbsp; <a href="../dashboard.html" style="color:#000;text-decoration:underline;">Retour au site principal</a></div>
  <script>if(sessionStorage.getItem("userRole")==="admin"){var b=document.getElementById("beta-banner");b.style.display="block";document.body.style.paddingTop="34px";}</script>
  <div class="page-container">

    <aside class="sidebar">
      <a href="beta/dashboard.html" class="back-btn-dash" style="margin-bottom:1.5rem; display:inline-flex;">&#8592; Accueil</a>
      <h2>Liens utiles</h2>
      <p class="sidebar-subtitle">Mes sites favoris</p>
      
      <div class="calendrier-header" style="margin-top: 1rem;">
        <h3 style="color:#888078; font-size:0.85rem; text-transform:uppercase;">Catégories</h3>
      </div>
      <nav class="sidebar-nav" id="categories-nav">
        </nav>
      <button class="btn-ajouter" onclick="ouvrirModalCat()" style="margin-top: 1rem; width: 100%; background: transparent;">+ Nv. Catégorie</button>
    </aside>

    <main class="page-content">
      <div class="cours-header">
        <h1 class="cours-titre" id="titre-categorie">Toutes les catégories</h1>
        <button class="btn-ajouter" onclick="ouvrirModalLien()">+ Ajouter un lien</button>
      </div>

      <div class="content-block">
        <div class="notes-container" id="liens-container">
          </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay hidden" id="modal-lien">
    <div class="modal-box">
      <h3 id="modal-lien-titre-label">Nouveau lien</h3>
      <label>Nom du site</label>
      <input type="text" id="modal-lien-nom" placeholder="Ex: Firebase Console" />
      
      <label>URL (Adresse web)</label>
      <input type="text" id="modal-lien-url" placeholder="Ex: https://..." />
      
      <label>Catégorie</label>
      <select id="modal-lien-cat"></select>
      
      <label>Description courte (Optionnel)</label>
      <input type="text" id="modal-lien-desc" placeholder="Ex: Base de données du projet" />

      <div class="modal-actions">
        <button class="btn-cancel" onclick="fermerModalLien()">Annuler</button>
        <button class="btn-save" id="modal-lien-save">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="modal-cat">
    <div class="modal-box">
      <h3>Nouvelle catégorie</h3>
      <label>Nom de la catégorie</label>
      <input type="text" id="modal-cat-nom" placeholder="Ex: Développement" />
      
      <div class="modal-actions">
        <button class="btn-cancel" onclick="fermerModalCat()">Annuler</button>
        <button class="btn-save" onclick="sauvegarderCat()">Enregistrer</button>
      </div>
    </div>
  </div>

  <script type="module" src="liens.js"></script>
  <div data-version-badge style="position:fixed;bottom:1rem;left:1rem;background:red;color:white;font-weight:bold;font-size:0.8rem;padding:0.3rem 0.6rem;border-radius:5px;z-index:9999;"></div>
  <script src="version.js"></script>
</body>
</html>
