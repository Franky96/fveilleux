<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="../">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outils de Frank — Connexion</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="beta/style-beta.css">
</head>
<body>
  <div id="beta-banner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#f39c12;color:#000;text-align:center;padding:0.4rem 1rem;font-size:0.82rem;font-weight:bold;letter-spacing:0.05em;box-shadow:0 2px 6px rgba(0,0,0,0.3);">🚧 MODE EN CONSTRUCTION — les modifications ici n'affectent pas le site principal <body>nbsp;·<body>nbsp; <a href="../dashboard.html" style="color:#000;text-decoration:underline;">Retour au site principal</a></div>
  <script>if(sessionStorage.getItem("userRole")==="admin"){document.getElementById("beta-banner").style.display="block";document.body.classList.add("beta-active");}</script>
  <div class="login-container">
    <h1>Outils de Frank</h1>
    <p class="subtitle">Espace privé</p>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Nom d'utilisateur" required />
      <input type="password" id="password" placeholder="Mot de passe" required />
      <button type="submit">Se connecter</button>
      <p id="error-msg"></p>
    </form>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
