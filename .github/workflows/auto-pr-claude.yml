name: Auto-create PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Vérifie si une PR ouverte existe déjà
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'master',
              state: 'open'
            });

            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Claude: ${branch}`,
                head: branch,
                base: 'master',
                body: 'PR créée automatiquement par Claude.'
              });
              console.log(`PR créée pour ${branch}`);
            } else {
              console.log(`PR déjà ouverte (#${prs[0].number}), rien à faire.`);
            }
