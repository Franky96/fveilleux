name: Auto-merge PR for Claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  create-and-merge-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // Vérifie si une PR ouverte existe déjà
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'master',
              state: 'open'
            });

            let prNumber;
            if (prs.length === 0) {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Claude: ${branch}`,
                head: branch,
                base: 'master',
                body: 'PR créée et mergée automatiquement par Claude.'
              });
              prNumber = pr.number;
              console.log(`PR #${prNumber} créée pour ${branch}`);
            } else {
              prNumber = prs[0].number;
              console.log(`PR #${prNumber} déjà ouverte, merge en cours...`);
            }

            // Merge automatique
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'merge'
            });
            console.log(`PR #${prNumber} mergée dans master.`);
