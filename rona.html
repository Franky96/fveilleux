<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RONA — Santé &amp; Sécurité</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { align-items: flex-start; }

    .rona-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #0a0f0a;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Top bar ── */
    .rona-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f1a0f;
      border-bottom: 1px solid #2a3a2a;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .rona-topbar a {
      color: #80cc80;
      text-decoration: none;
      font-size: 1.3rem;
      padding: 0.3rem;
    }
    .rona-topbar h1 {
      font-size: 1rem;
      color: #f0ede6;
      margin: 0;
      flex: 1;
    }

    /* ── Sélection emplacement ── */
    .location-bar {
      padding: 0.75rem 1rem;
      background: #0a0f0a;
      border-bottom: 1px solid #1a2a1a;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .location-bar label {
      font-size: 0.8rem;
      color: #a89f94;
      white-space: nowrap;
    }
    .location-select {
      flex: 1;
      background: #0f1a0f;
      border: 1px solid #2a3a2a;
      border-radius: 8px;
      color: #f0ede6;
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
      width: auto;
      margin: 0;
    }
    .location-select:focus { border-color: #80cc80; }
    .btn-add-location {
      width: auto;
      background: transparent;
      border: 1px solid #2a3a2a;
      color: #80cc80;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: bold;
    }

    /* ── Barre de statut ── */
    .status-bar {
      padding: 0.5rem 1rem;
      background: #0a0f0a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a2a1a;
    }
    .status-bar span { font-size: 0.8rem; color: #a89f94; }
    .status-count { font-weight: bold; }
    .status-count.alert { color: #c0392b; }
    .status-count.ok { color: #80cc80; }
    .btn-reset-all {
      width: auto;
      background: transparent;
      border: 1px solid #2a3a2a;
      color: #a89f94;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
    }

    /* ── Grille d'articles ── */
    .items-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      padding: 0.75rem;
    }

    /* ── Carte article ── */
    .item-card {
      background: #0f1a0f;
      border: 1px solid #2a3a2a;
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.15s;
      min-height: 5rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .item-card.manquant {
      border-color: #c0392b;
      background: #1a0808;
    }
    .item-card:active { opacity: 0.85; }

    /* fraction en haut à gauche */
    .item-fraction {
      position: absolute;
      top: 0.45rem;
      left: 0.6rem;
      font-size: 0.7rem;
      color: #555;
      font-weight: bold;
    }
    .item-card.manquant .item-fraction { color: #c0392b; }

    /* nom de l'article */
    .item-nom {
      font-size: 0.85rem;
      color: #f0ede6;
      margin-top: 1.2rem;
      line-height: 1.3;
    }

    /* quantité manquante en bas */
    .item-manquant-label {
      font-size: 0.75rem;
      color: #c0392b;
      font-weight: bold;
      margin-top: 0.35rem;
    }

    /* ── Modal saisie quantité manquante ── */
    .modal-overlay { z-index: 300; }
    #modal-item .modal-box { max-width: 320px; margin: auto; }
    #modal-item-nom {
      font-size: 1rem;
      font-weight: bold;
      color: #f0ede6;
      margin-bottom: 1rem;
    }
    #modal-item .modal-box label {
      font-size: 0.85rem;
      color: #a89f94;
      display: block;
      margin-bottom: 0.3rem;
    }
    #modal-qte {
      font-size: 1.4rem;
      text-align: center;
      padding: 0.75rem;
    }
    .qty-hint {
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      margin-top: 0.3rem;
    }
    .btn-marquer-ok {
      width: 100%;
      background: transparent;
      border: 1px solid #2a5a2a;
      color: #80cc80;
      padding: 0.6rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    /* ── Modal emplacement ── */
    .modal-box input { margin-bottom: 0.75rem; }
    .modal-box label { font-size: 0.85rem; color: #a89f94; margin-bottom: 0.3rem; display: block; }

    /* ── État vide ── */
    .rona-empty {
      text-align: center;
      padding: 3rem 2rem;
      color: #555;
      font-size: 0.9rem;
    }
    .rona-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
<div class="rona-container">

  <div class="rona-topbar">
    <a href="dashboard.html">&#8592;</a>
    <h1>👷‍♂️ Santé &amp; Sécurité — RONA</h1>
  </div>

  <!-- Sélection emplacement -->
  <div class="location-bar">
    <label>📍 Emplacement</label>
    <select class="location-select" id="location-select" onchange="changerLocation()">
      <option value="">— choisir —</option>
    </select>
    <button class="btn-add-location" onclick="ouvrirModalLocation()">+</button>
  </div>

  <!-- Barre de statut -->
  <div class="status-bar" id="status-bar" style="display:none;">
    <span>Articles : <span class="status-count" id="status-count"></span></span>
    <button class="btn-reset-all" onclick="toutMarquerComplet()">✓ Tout complet</button>
  </div>

  <!-- Grille -->
  <div class="items-grid" id="items-grid"></div>

</div>

<!-- Modal : saisie quantité manquante -->
<div class="modal-overlay hidden" id="modal-item">
  <div class="modal-box">
    <h3 id="modal-item-nom"></h3>
    <p id="modal-item-total" style="font-size:0.8rem; color:#a89f94; margin-bottom:1rem;"></p>
    <label>Quantité manquante</label>
    <input type="number" id="modal-qte" min="1" placeholder="ex: 3" inputmode="numeric">
    <p class="qty-hint">Laisser vide = article entièrement manquant</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fermerModalItem()">Annuler</button>
      <button class="btn-save" onclick="sauvegarderManquant()">Enregistrer</button>
    </div>
    <button class="btn-marquer-ok" onclick="marquerComplet()">✓ Marquer comme complet</button>
  </div>
</div>

<!-- Modal : nouvel emplacement -->
<div class="modal-overlay hidden" id="modal-location">
  <div class="modal-box">
    <h3 id="modal-location-titre">Nouvel emplacement</h3>
    <label>Nom de l'emplacement</label>
    <input type="text" id="location-nom" placeholder="Ex: Atelier A, Bureau, Entrepôt…" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fermerModalLocation()">Annuler</button>
      <button class="btn-save" id="location-save-btn">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module" src="rona.js"></script>
</body>
</html>
