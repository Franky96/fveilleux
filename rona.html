<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RONA — Santé &amp; Sécurité</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { align-items: flex-start; }

    .rona-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #0a0f0a;
      min-height: 100vh;
      padding-bottom: 4rem;
    }

    /* ── Top bar ── */
    .rona-topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #0f1a0f;
      border-bottom: 1px solid #2a3a2a;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .rona-topbar a {
      color: #80cc80;
      text-decoration: none;
      font-size: 1.3rem;
      padding: 0.3rem;
    }
    .rona-topbar h1 {
      font-size: 1rem;
      color: #f0ede6;
      margin: 0;
      flex: 1;
    }

    /* ── Sélection emplacement ── */
    .location-bar {
      padding: 0.75rem 1rem;
      background: #0a0f0a;
      border-bottom: 1px solid #1a2a1a;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .location-bar label {
      font-size: 0.8rem;
      color: #a89f94;
      white-space: nowrap;
    }
    .location-select {
      flex: 1;
      background: #0f1a0f;
      border: 1px solid #2a3a2a;
      border-radius: 8px;
      color: #f0ede6;
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      outline: none;
      width: auto;
      margin: 0;
    }
    .location-select:focus { border-color: #80cc80; }
    .btn-add-location {
      width: auto;
      background: transparent;
      border: 1px solid #2a3a2a;
      color: #80cc80;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: bold;
    }

    /* ── Barre de statut ── */
    .status-bar {
      padding: 0.5rem 1rem;
      background: #0a0f0a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a2a1a;
    }
    .status-bar span { font-size: 0.8rem; color: #a89f94; }
    .status-count { font-weight: bold; }
    .status-count.alert { color: #c0392b; }
    .status-count.ok { color: #80cc80; }
    .btn-reset-all {
      width: auto;
      background: transparent;
      border: 1px solid #2a3a2a;
      color: #a89f94;
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
    }

    /* ── Liste d'articles ── */
    .items-grid {
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.75rem;
      gap: 0;
    }

    /* ── Ligne article ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0.75rem;
      border-bottom: 1px solid #1a2a1a;
      background: #0f1a0f;
    }
    .item-row:first-child { border-radius: 10px 10px 0 0; }
    .item-row:last-child  { border-radius: 0 0 10px 10px; border-bottom: none; }
    .item-row:only-child  { border-radius: 10px; }
    .item-row.manquant    { background: #1a0808; }

    /* Checkbox custom */
    .item-chk {
      width: 1.7rem;
      height: 1.7rem;
      min-width: 1.7rem;
      border-radius: 6px;
      border: 2px solid #2a5a2a;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .item-chk.checked { background: #c0392b; border-color: #c0392b; color: #fff; }

    /* Nom + fraction */
    .item-info { flex: 1; min-width: 0; }
    .item-nom {
      font-size: 0.9rem;
      color: #f0ede6;
      line-height: 1.3;
    }
    .item-fraction {
      font-size: 0.7rem;
      color: #555;
      font-weight: bold;
      margin-top: 0.15rem;
    }
    .item-row.manquant .item-fraction { color: #c0392b; }

    /* Champ quantité manquante */
    .item-qte-input {
      width: 3.5rem;
      text-align: center;
      padding: 0.4rem 0.3rem;
      font-size: 1rem;
      font-weight: bold;
      margin: 0;
      background: #0a0f0a;
      border: 1px solid #c0392b;
      border-radius: 8px;
      color: #c0392b;
      display: none;
    }
    .item-row.manquant .item-qte-input { display: block; }

    /* ── Modal emplacement ── */
    .modal-overlay { z-index: 300; }

    /* ── Modal emplacement ── */
    .modal-box input { margin-bottom: 0.75rem; }
    .modal-box label { font-size: 0.85rem; color: #a89f94; margin-bottom: 0.3rem; display: block; }

    /* ── État vide ── */
    .rona-empty {
      text-align: center;
      padding: 3rem 2rem;
      color: #555;
      font-size: 0.9rem;
    }
    .rona-empty span { font-size: 2.5rem; display: block; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
<div class="rona-container">

  <div class="rona-topbar">
    <a href="dashboard.html">&#8592;</a>
    <h1>👷‍♂️ Santé &amp; Sécurité — RONA</h1>
  </div>

  <!-- Sélection emplacement -->
  <div class="location-bar">
    <label>📍 Emplacement</label>
    <select class="location-select" id="location-select" onchange="changerLocation()">
      <option value="">— choisir —</option>
    </select>
    <button class="btn-add-location" onclick="ouvrirModalLocation()">+</button>
  </div>

  <!-- Grille -->
  <div class="items-grid" id="items-grid"></div>

  <!-- Bouton PDF -->
  <div id="btn-pdf-container" style="display:none; padding:1rem 0.75rem;">
    <button id="btn-pdf" onclick="genererPDF()"
      style="width:100%; background:#c0392b; color:#fff; border:none; border-radius:10px;
             padding:1rem; font-size:1rem; font-weight:bold; cursor:pointer;">
      📄 Générer le PDF
    </button>
  </div>

</div>

<!-- Modal : nouvel emplacement -->
<div class="modal-overlay hidden" id="modal-location">
  <div class="modal-box">
    <h3 id="modal-location-titre">Nouvel emplacement</h3>
    <label>Nom de l'emplacement</label>
    <input type="text" id="location-nom" placeholder="Ex: Atelier A, Bureau, Entrepôt…" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fermerModalLocation()">Annuler</button>
      <button class="btn-save" id="location-save-btn">Enregistrer</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script type="module" src="rona.js"></script>
</body>
</html>
